custom_proxy_group=💻 开发`select`[]✈️ 起飞`[]🇺🇸 美国`[]🇸🇬 新加坡`[]🇯🇵 日本`[]🇹🇼 台湾`[]🎏 其他`[]👆🏻🇺🇸 美国`[]👆🏻🇸🇬 新加坡`[]👆🏻🇯🇵 日本`[]👆🏻🇹🇼 台湾`[]👆🏻🎏 其他`[]👆🏻 指定`[]REJECT
