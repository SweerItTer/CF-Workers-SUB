[custom]
; 严格规则模式（墙外尽量代理，墙内/有中国业务的服务尽量直连）
; 1. 代理组默认不暴露 DIRECT，避免误选导致海外流量直连
; 2. AI / 开发平台 / 常见海外服务显式前置，优先于通用远程规则集
; 3. 微软 / 苹果这类存在中国区服务的厂商单独分组，默认直连优先
; 4. PROCESS-NAME 规则仅在支持该能力的客户端 / 模式下生效（如 Clash Meta TUN）

exclude_remarks=(Data Left|Remain:|Traffic:|Expir[ey]|Reset|(\d[\d.]*\s*[MG]B[^\dA-Za-z]+|[:：]\s*)\d[\d.]*\s*GB(?![\dA-Za-z])|剩[余餘]流量|流量：|[到过過效]期|[时時][间間]|重置|分割线|残り使用容量|残りデータ通信量|有効期限|リセット|🔰 (ID|HSD|SNI):|📝 Gói:)

add_emoji=true
remove_old_emoji=false

custom_proxy_group=✈️ 起飞`select`[]⚡ 低延迟`[]👆🏻 指定`[]🇭🇰 香港`[]🇹🇼 台湾`[]🇨🇳 中国`[]🇸🇬 新加坡`[]🇯🇵 日本`[]🇺🇸 美国`[]🎏 其他`[]👆🏻🇭🇰 香港`[]👆🏻🇹🇼 台湾`[]👆🏻🇨🇳 中国`[]👆🏻🇸🇬 新加坡`[]👆🏻🇯🇵 日本`[]👆🏻🇺🇸 美国`[]👆🏻🎏 其他`[]REJECT
custom_proxy_group=⚡ 低延迟`url-test`^`https://www.google.com/generate_204`30,,100
custom_proxy_group=👆🏻 指定`select`^

custom_proxy_group=🛩️ 墙内`select`[]DIRECT`[]REJECT`[]✈️ 起飞
custom_proxy_group=💩 广告`select`[]REJECT`[]🛩️ 墙内`[]✈️ 起飞

custom_proxy_group=📺 B站`select`[]🛩️ 墙内`[]🇭🇰 香港`[]🇹🇼 台湾`[]🇨🇳 中国`[]✈️ 起飞`[]👆🏻🇭🇰 香港`[]👆🏻🇹🇼 台湾`[]👆🏻🇨🇳 中国`[]👆🏻 指定
